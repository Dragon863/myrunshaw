name: runshaw
description: "My Runshaw mobile app"
publish_to: "none" # don't remove this line! we don't want to accidentally publish this app to pub.dev

version: 2.0.0+53

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^7.1.4
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  flutter_slider_drawer: ^3.0.2
  shared_preferences: ^2.5.4
  intl: ^0.20.3
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1
  http: ^1.6.0
  dropdown_button2: ^3.1.0
  onesignal_flutter: ^5.6.3
  url_launcher: ^6.3.1
  video_player: ^2.11.1
  crop_your_image: ^2.0.0
  package_info_plus: ^10.2.0
  flutter_image_map: ^1.0.1
  pub_semver: ^2.1.5
  skeletonizer: ^2.0.1
  posthog_flutter: ^5.30.0
  device_info_plus: ^13.2.0
  gaimon: ^1.4.2
  flutter_cache_manager: ^3.4.1
  cronet_http: ^1.9.0
  cupertino_http: ^3.0.2
  fetch_client: ^1.2.0
  home_widget: ^0.9.2
  background_fetch: ^1.7.0
  permission_handler: ^12.0.3
  network_info_plus: ^8.2.0
  cupertino_icons: ^1.0.2
  flutter_web_auth_2: ^5.0.3
  timeago: ^3.7.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/img/map/
    - assets/img/onboarding/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik-Italic.ttf
          style: italic
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
